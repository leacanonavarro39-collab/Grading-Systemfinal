<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sunflower Grading System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sun-yellow: #ffcc00;
            --sun-dark: #f39c12;
            --excel-green: #217346;
            --glass: rgba(15, 15, 15, 0.95);
            --text-light: #f5f5f5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.pexels.com/photos/1367192/pexels-photo-1367192.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 2px solid var(--sun-yellow);
            border-radius: 25px;
            width: 100%;
            max-width: 1250px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Profile Header Style */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 204, 0, 0.3);
            padding-bottom: 15px;
        }
        .profile-name { color: var(--sun-yellow); font-weight: 800; font-size: 1.4rem; letter-spacing: 2px; margin: 0; }
        .profile-title { color: #fff; font-size: 0.8rem; opacity: 0.8; letter-spacing: 1px; }

        h2 { color: var(--sun-yellow); text-align: center; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; margin: 20px 0; }
        
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .full-span { grid-column: 1 / -1; }

        label { display: block; font-size: 0.8rem; color: var(--sun-yellow); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #444;
            background: rgba(255,255,255,0.08); color: white; box-sizing: border-box;
            font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--sun-yellow); background: rgba(255,255,255,0.15); outline: none; }

        .section-tag {
            grid-column: 1 / -1; background: linear-gradient(90deg, var(--sun-yellow), transparent);
            padding: 8px 15px; border-radius: 5px; color: #000; font-weight: 800; font-size: 0.85rem; margin-top: 15px;
        }

        .btn-panel { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 30px; }
        .btn {
            flex: 1; padding: 18px; border-radius: 50px; border: none; font-weight: 800;
            cursor: pointer; text-transform: uppercase; transition: 0.3s; min-width: 180px;
        }
        .btn-save { background: var(--sun-yellow); color: #000; }
        .btn-view { background: #3498db; color: #fff; }
        .btn-sum { background: #9b59b6; color: #fff; }
        .btn-back { background: #555; color: #fff; }
        .btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; color: #222; width: 98%; max-width: 1700px; height: 90vh;
            border-radius: 20px; padding: 30px; position: relative; overflow: auto;
            border: 8px solid var(--excel-green);
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 20px; }
        th { background: var(--excel-green); color: white; padding: 10px; border: 1px solid #bbb; text-transform: uppercase; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: 500; }
        tr:nth-child(even) { background: #f2f2f2; }

        .grade-total { background: #fff9c4 !important; font-weight: 700; color: #000; }
        .grade-perc { background: #e8f5e9 !important; font-weight: 700; color: var(--excel-green); }
        .grade-final { background: #ffeb3b !important; font-weight: 900; color: #000; font-size: 0.85rem; border: 2px solid var(--sun-dark); }

        .close-btn { position: sticky; top: 0; float: right; background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 800; z-index: 10; }
        .action-btn { padding: 5px 10px; border-radius: 5px; border: none; color: white; cursor: pointer; font-size: 11px; margin: 2px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <p class="profile-name">LEA CAÑO</p>
        <p class="profile-title">| BSIT-3A Portal</p>
    </div>

    <div id="setupScreen" style="text-align: center;">
        <h2>🌻 Grading Setup</h2>
        <div class="input-group">
            <div class="full-span"><label>Course Title</label><input type="text" id="course" value="SYSTEM ANALYSIS AND DESIGN"></div>
            <div class="full-span"><label>Year & Section</label><input type="text" id="section" placeholder="e.g. BSIS 3-A"></div>
        </div>
        <button class="btn btn-save" onclick="startGrading()">Proceed to Encoding</button>
    </div>

    <div id="encoderScreen" style="display:none;">
        <h2 id="displayHead"></h2>
        <div class="input-group">
            <div class="full-span"><label>Student Full Name</label><input type="text" id="stuName" placeholder="SURNAME, FIRST NAME"></div>
            
            <div class="section-tag">QUIZZES (20% - Total Items: 330)</div>
            <div><label>Q1</label><input type="number" id="q1"></div>
            <div><label>Q2</label><input type="number" id="q2"></div>
            <div><label>Q3</label><input type="number" id="q3"></div>
            <div><label>Q4</label><input type="number" id="q4"></div>

            <div class="section-tag">LABORATORY (30% - Total Items: 400)</div>
            <div><label>P1</label><input type="number" id="p1"></div>
            <div><label>P2</label><input type="number" id="p2"></div>
            <div><label>P3</label><input type="number" id="p3"></div>
            <div><label>P4</label><input type="number" id="p4"></div>

            <div class="section-tag">ASSIGNMENTS (10% - Total Items: 100)</div>
            <div><label>A1</label><input type="number" id="a1"></div>
            <div><label>A2</label><input type="number" id="a2"></div>

            <div class="section-tag">OTHER COMPONENTS</div>
            <div><label>Attendance (10%)</label><input type="number" id="attd"></div>
            <div><label>Major exam (30%)</label><input type="number" id="mid"></div>
        </div>

        <div class="btn-panel">
            <button class="btn btn-save" onclick="saveData()">Save Record</button>
            <button class="btn btn-view" onclick="showModal('detailed')">Detailed Table</button>
            <button class="btn btn-sum" onclick="showModal('summary')">Summary Report</button>
            <button class="btn btn-back" onclick="goBack()">Back</button>
        </div>
    </div>
</div>

<div id="tableModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✕ CLOSE</button>
        <h2 id="modalTitle" style="color:var(--excel-green); text-align:left; border-bottom: 2px solid var(--excel-green); padding-bottom: 10px;"></h2>
        <div id="tableData"></div>
    </div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem("pcc_data")) || [];

    function startGrading() {
        const sec = document.getElementById('section').value;
        if(!sec) return alert("Please enter Section!");
        document.getElementById('displayHead').innerText = document.getElementById('course').value + " (" + sec + ")";
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('encoderScreen').style.display = 'block';
    }

    function goBack() {
        document.getElementById('setupScreen').style.display = 'block';
        document.getElementById('encoderScreen').style.display = 'none';
    }

    function saveData() {
        const nameInput = document.getElementById('stuName');
        if(!nameInput.value) return alert("Student Name is required!");
        
        const gv = (id) => parseFloat(document.getElementById(id).value) || 0;

        const qTot = gv('q1')+gv('q2')+gv('q3')+gv('q4');
        const qEq = (qTot/330)*100;
        const pTot = gv('p1')+gv('p2')+gv('p3')+gv('p4');
        const pEq = (pTot/400)*100;
        const aTot = gv('a1')+gv('a2');
        const aEq = (aTot/100)*100;

        const final = (qEq*0.2) + (pEq*0.3) + (aEq*0.1) + (gv('attd')*0.1) + (gv('mid')*0.3);

        const newStudent = {
            id: Date.now(),
            name: nameInput.value.toUpperCase(),
            q: [gv('q1'), gv('q2'), gv('q3'), gv('q4'), qTot, qEq.toFixed(2), (qEq*0.2).toFixed(2)],
            p: [gv('p1'), gv('p2'), gv('p3'), gv('p4'), pTot, pEq.toFixed(2), (pEq*0.3).toFixed(2)],
            a: [gv('a1'), gv('a2'), aTot, aEq.toFixed(2), (aEq*0.1).toFixed(2)],
            o: [gv('attd'), gv('mid')],
            gr: final.toFixed(2)
        };

        students.push(newStudent);
        localStorage.setItem("pcc_data", JSON.stringify(students));
        
        nameInput.value = "";
        document.querySelectorAll('#encoderScreen input[type="number"]').forEach(i => i.value = "");
        alert("Record Saved Successfully!");
    }

    function showModal(mode) {
        students.sort((a,b) => a.name.localeCompare(b.name));
        const div = document.getElementById('tableData');
        const title = document.getElementById('modalTitle');
        let html = `<table>`;

        if(mode === 'detailed') {
            title.innerText = "Detailed Grade Record";
            html += `<thead>
                <tr>
                    <th rowspan="2">Student Name</th>
                    <th colspan="7">Quizzes (20%)</th>
                    <th colspan="7">Laboratory (30%)</th>
                    <th colspan="5">Assignments (10%)</th>
                    <th colspan="2">Other</th>
                    <th rowspan="2">Final GR</th>
                    <th rowspan="2">Actions</th>
                </tr>
                <tr>
                    <th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Tot</th><th>Eq</th><th>20%</th>
                    <th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>Tot</th><th>Eq</th><th>30%</th>
                    <th>A1</th><th>A2</th><th>Tot</th><th>Eq</th><th>10%</th>
                    <th>AT</th><th>MI</th>
                </tr>
            </thead><tbody>`;
            
            students.forEach(s => {
                html += `<tr>
                    <td style="text-align:left; font-weight:bold;">${s.name}</td>
                    <td>${s.q[0]}</td><td>${s.q[1]}</td><td>${s.q[2]}</td><td>${s.q[3]}</td><td class="grade-total">${s.q[4]}</td><td class="grade-total">${s.q[5]}</td><td class="grade-perc">${s.q[6]}</td>
                    <td>${s.p[0]}</td><td>${s.p[1]}</td><td>${s.p[2]}</td><td>${s.p[3]}</td><td class="grade-total">${s.p[4]}</td><td class="grade-total">${s.p[5]}</td><td class="grade-perc">${s.p[6]}</td>
                    <td>${s.a[0]}</td><td>${s.a[1]}</td><td class="grade-total">${s.a[2]}</td><td class="grade-total">${s.a[3]}</td><td class="grade-perc">${s.a[4]}</td>
                    <td>${s.o[0]}</td><td>${s.o[1]}</td><td class="grade-final">${s.gr}</td>
                    <td>
                        <button class="action-btn" style="background:#f39c12" onclick="editRow(${s.id})">Edit</button>
                        <button class="action-btn" style="background:#e74c3c" onclick="deleteRow(${s.id}, 'detailed')">Del</button>
                    </td></tr>`;
            });
        } else {
            title.innerText = "Class Summary Report";
            html += `<thead><tr><th>Rank</th><th>Student Name</th><th>Final Average</th><th>Actions</th></tr></thead><tbody>`;
            students.forEach((s,i) => {
                html += `<tr>
                    <td>${i+1}</td>
                    <td style="text-align:left; font-weight:bold;">${s.name}</td>
                    <td class="grade-final">${s.gr}</td>
                    <td>
                        <button class="action-btn" style="background:#f39c12" onclick="editRow(${s.id})">Edit</button>
                        <button class="action-btn" style="background:#e74c3c" onclick="deleteRow(${s.id}, 'summary')">Del</button>
                    </td></tr>`;
            });
        }
        div.innerHTML = html + `</tbody></table>`;
        document.getElementById('tableModal').style.display = 'flex';
    }

    function deleteRow(id, currentMode) {
        if(confirm("Confirm deletion of this student?")) {
            students = students.filter(s => s.id !== id);
            localStorage.setItem("pcc_data", JSON.stringify(students));
            showModal(currentMode);
        }
    }

    function editRow(id) {
        const s = students.find(x => x.id === id);
        if(s) {
            document.getElementById('stuName').value = s.name;
            document.getElementById('q1').value = s.q[0]; document.getElementById('q2').value = s.q[1];
            document.getElementById('q3').value = s.q[2]; document.getElementById('q4').value = s.q[3];
            document.getElementById('p1').value = s.p[0]; document.getElementById('p2').value = s.p[1];
            document.getElementById('p3').value = s.p[2]; document.getElementById('p4').value = s.p[3];
            document.getElementById('a1').value = s.a[0]; document.getElementById('a2').value = s.a[1];
            document.getElementById('attd').value = s.o[0]; document.getElementById('mid').value = s.o[1];
            
            students = students.filter(x => x.id !== id);
            localStorage.setItem("pcc_data", JSON.stringify(students));
            closeModal();
            alert("Data Loaded. Edit and then Save Record to update.");
        }
    }

    function closeModal() { document.getElementById('tableModal').style.display = 'none'; }
</script>
</body>
                                    </html>
